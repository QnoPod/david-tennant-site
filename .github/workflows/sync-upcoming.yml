name: Sync UPCOMING data

on:
  schedule:
    # Vercel Cron（04:00 UTC）の取得キャッシュ更新後に実行します。
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upcoming-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch, merge and clean UPCOMING data
        run: npm run sync:upcoming
        env:
          UPCOMING_SNAPSHOT_URL: https://david-tennant-site.vercel.app/api/upcoming/snapshot
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}

      - name: Commit only when content changed
        shell: bash
        run: |
          if git diff --quiet -- app/data/upcomingWorks.ts; then
            echo "No UPCOMING changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data/upcomingWorks.ts
          git commit -m "Auto-update UPCOMING data"
          git pull --rebase origin main
          git push origin HEAD:main
